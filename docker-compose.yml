services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: travellers-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Str0ng_Passw0rd!"
    ports:
      - "1433:1433"
    volumes:
      - travellers-sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" -b"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  travellers-sqlserver-data:
